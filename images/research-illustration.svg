<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#011F5B"/>
      <stop offset="100%" stop-color="#1a4080"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="320" rx="12" fill="url(#grad1)"/>
  <!-- Stylized text document lines -->
  <g fill="none" stroke="white" opacity="0.2" stroke-width="2" stroke-linecap="round">
    <line x1="40" y1="60" x2="200" y2="60"/>
    <line x1="40" y1="80" x2="180" y2="80"/>
    <line x1="40" y1="100" x2="220" y2="100"/>
    <line x1="40" y1="120" x2="160" y2="120"/>
    <line x1="40" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="180" x2="190" y2="180"/>
    <line x1="40" y1="200" x2="210" y2="200"/>
    <line x1="40" y1="220" x2="170" y2="220"/>
    <line x1="40" y1="260" x2="200" y2="260"/>
    <line x1="40" y1="280" x2="150" y2="280"/>
  </g>
  <!-- Highlighted text segments (NLP annotations) -->
  <rect x="40" y="52" width="75" height="16" rx="3" fill="#3E7CB9" opacity="0.6"/>
  <rect x="120" y="52" width="50" height="16" rx="3" fill="#5A9FCC" opacity="0.5"/>
  <rect x="40" y="152" width="90" height="16" rx="3" fill="#3E7CB9" opacity="0.6"/>
  <rect x="40" y="252" width="60" height="16" rx="3" fill="#5A9FCC" opacity="0.5"/>
  <!-- Brain/ML symbol on right -->
  <circle cx="360" cy="160" r="80" fill="none" stroke="#3E7CB9" stroke-width="2" opacity="0.4"/>
  <circle cx="360" cy="160" r="55" fill="none" stroke="#5A9FCC" stroke-width="1.5" opacity="0.3"/>
  <!-- Neural network dots -->
  <g fill="#3E7CB9" opacity="0.7">
    <circle cx="360" cy="100" r="6"/>
    <circle cx="310" cy="140" r="5"/>
    <circle cx="410" cy="140" r="5"/>
    <circle cx="290" cy="180" r="4"/>
    <circle cx="360" cy="175" r="7"/>
    <circle cx="430" cy="180" r="4"/>
    <circle cx="330" cy="215" r="5"/>
    <circle cx="390" cy="215" r="5"/>
    <circle cx="360" cy="220" r="4"/>
  </g>
  <!-- Connections -->
  <g stroke="#5A9FCC" stroke-width="1.2" opacity="0.4">
    <line x1="360" y1="100" x2="310" y2="140"/>
    <line x1="360" y1="100" x2="410" y2="140"/>
    <line x1="310" y1="140" x2="290" y2="180"/>
    <line x1="310" y1="140" x2="360" y2="175"/>
    <line x1="410" y1="140" x2="360" y2="175"/>
    <line x1="410" y1="140" x2="430" y2="180"/>
    <line x1="290" y1="180" x2="330" y2="215"/>
    <line x1="360" y1="175" x2="330" y2="215"/>
    <line x1="360" y1="175" x2="390" y2="215"/>
    <line x1="430" y1="180" x2="390" y2="215"/>
  </g>
  <!-- Health cross symbol -->
  <g fill="white" opacity="0.8">
    <rect x="350" y="148" width="20" height="6" rx="3"/>
    <rect x="357" y="141" width="6" height="20" rx="3"/>
  </g>
</svg>
