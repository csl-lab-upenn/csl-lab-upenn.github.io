<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#011F5B"/>
      <stop offset="100%" stop-color="#0a2a5e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="480" height="320" rx="12" fill="url(#grad2)"/>
  <!-- Dashboard window frame -->
  <rect x="40" y="40" width="400" height="240" rx="8" fill="none" stroke="#3E7CB9" stroke-width="1.5" opacity="0.4"/>
  <!-- Window chrome dots -->
  <circle cx="60" cy="62" r="5" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="78" cy="62" r="5" fill="#ffd93d" opacity="0.6"/>
  <circle cx="96" cy="62" r="5" fill="#6bcb77" opacity="0.6"/>
  <!-- Separator line -->
  <line x1="40" y1="78" x2="440" y2="78" stroke="#3E7CB9" stroke-width="1" opacity="0.3"/>
  <!-- Bar chart bars -->
  <g fill="#3E7CB9" opacity="0.7">
    <rect x="70" y="170" width="30" height="90" rx="3"/>
    <rect x="115" y="140" width="30" height="120" rx="3"/>
    <rect x="160" y="155" width="30" height="105" rx="3"/>
    <rect x="205" y="120" width="30" height="140" rx="3"/>
    <rect x="250" y="145" width="30" height="115" rx="3"/>
  </g>
  <!-- Trend line -->
  <polyline points="85,175 130,145 175,160 220,125 265,150" fill="none" stroke="#5A9FCC" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Data points on line -->
  <g fill="#5A9FCC">
    <circle cx="85" cy="175" r="4"/>
    <circle cx="130" cy="145" r="4"/>
    <circle cx="175" cy="160" r="4"/>
    <circle cx="220" cy="125" r="4"/>
    <circle cx="265" cy="150" r="4"/>
  </g>
  <!-- Code snippet on right side -->
  <rect x="310" y="100" width="110" height="130" rx="6" fill="#0d2d6e" opacity="0.8"/>
  <g fill="none" stroke-linecap="round">
    <line x1="325" y1="120" x2="385" y2="120" stroke="#5A9FCC" stroke-width="1.5" opacity="0.6"/>
    <line x1="325" y1="135" x2="370" y2="135" stroke="#3E7CB9" stroke-width="1.5" opacity="0.5"/>
    <line x1="335" y1="150" x2="395" y2="150" stroke="#5A9FCC" stroke-width="1.5" opacity="0.6"/>
    <line x1="335" y1="165" x2="380" y2="165" stroke="#3E7CB9" stroke-width="1.5" opacity="0.5"/>
    <line x1="325" y1="180" x2="400" y2="180" stroke="#5A9FCC" stroke-width="1.5" opacity="0.6"/>
    <line x1="325" y1="195" x2="365" y2="195" stroke="#3E7CB9" stroke-width="1.5" opacity="0.5"/>
    <line x1="335" y1="210" x2="390" y2="210" stroke="#5A9FCC" stroke-width="1.5" opacity="0.6"/>
  </g>
  <!-- Code brackets -->
  <text x="320" y="125" font-family="monospace" font-size="14" fill="#5A9FCC" opacity="0.8">{</text>
  <text x="406" y="220" font-family="monospace" font-size="14" fill="#5A9FCC" opacity="0.8">}</text>
</svg>
